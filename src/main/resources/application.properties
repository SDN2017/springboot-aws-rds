spring.application.name=spring-aws-rds
# JDBC URL for local MySQL (default port is 3306)
#spring.datasource.url=jdbc:mysql://localhost:3306/testdb?useSSL=false&serverTimezone=America/Toronto&allowPublicKeyRetrieval=true
spring.datasource.url=jdbc:mysql://<rds-endpoint>:<port>/<database>

# MySQL credentials - LOCAL
#spring.datasource.username=<username>
#spring.datasource.password=<password>

#AWS
spring.datasource.username=<username>
spring.datasource.password=<password>


# JPA & Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8099
